<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life in鸡尾酒定制系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #14141f;
            --surface2: #1e1e2e;
            --accent: #f0a050;
            --accent2: #e06070;
            --text: #e8e8f0;
            --text2: #8888a0;
            --radius: 16px;
        }

        body {
            font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* === 首页 === */
        .page-home {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 60px 20px 40px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 16px;
            box-shadow: 0 4px 24px rgba(240,160,80,0.15);
        }

        .logo-title {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-sub {
            font-size: 14px;
            color: var(--text2);
            margin-top: 8px;
        }

        /* 输入区 */
        .input-area {
            width: 100%;
            max-width: 480px;
            margin-bottom: 32px;
        }

        .input-box {
            background: var(--surface);
            border: 1px solid rgba(240, 160, 80, 0.15);
            border-radius: var(--radius);
            padding: 20px;
            transition: border-color 0.3s;
        }

        .input-box:focus-within {
            border-color: rgba(240, 160, 80, 0.4);
        }

        .input-box textarea {
            width: 100%;
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            min-height: 80px;
            font-family: inherit;
        }

        .input-box textarea::placeholder {
            color: var(--text2);
        }

        .input-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .char-count {
            font-size: 12px;
            color: var(--text2);
        }

        .btn-search {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 24px;
            padding: 10px 28px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-search:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        .btn-search:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* 快捷标签 */
        .quick-tags {
            width: 100%;
            max-width: 480px;
            margin-bottom: 32px;
        }

        .quick-tags-title {
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 12px;
        }

        .tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: var(--surface2);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .tag:active {
            background: rgba(240, 160, 80, 0.15);
            border-color: var(--accent);
        }

        /* 加载状态 */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10,10,15,0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-icon {
            font-size: 48px;
            animation: shake 1.2s ease-in-out infinite;
        }

        .loading-text {
            margin-top: 16px;
            font-size: 15px;
            color: var(--text2);
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }

        /* === 结果页 === */
        .page-results {
            display: none;
            min-height: 100vh;
            padding: 20px;
        }

        .page-results.active {
            display: block;
        }

        .results-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 12px;
        }

        .btn-back {
            background: var(--surface2);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
        }

        .results-header-text {
            font-size: 16px;
            font-weight: 600;
        }

        /* AI 评语 */
        .ai-comment {
            background: linear-gradient(135deg, rgba(240,160,80,0.08), rgba(224,96,112,0.08));
            border: 1px solid rgba(240,160,80,0.15);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
        }

        .ai-comment .ai-label {
            font-size: 12px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 6px;
        }

        /* 歧义选项 */
        .ambiguity-option {
            display: inline-block;
            background: var(--surface2);
            border: 1px solid rgba(240,160,80,0.2);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            color: var(--accent);
            cursor: pointer;
            margin-top: 8px;
            margin-right: 8px;
            transition: all 0.2s;
        }

        .ambiguity-option:active {
            background: rgba(240,160,80,0.15);
        }

        /* 鸡尾酒卡片 */
        .cocktail-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .cocktail-card:active {
            transform: scale(0.98);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .card-name {
            font-size: 20px;
            font-weight: 700;
        }

        .card-name-en {
            font-size: 13px;
            color: var(--text2);
            margin-top: 2px;
        }

        .match-score {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 12px;
            padding: 4px 12px;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
        }

        .card-desc {
            font-size: 14px;
            color: var(--text2);
            line-height: 1.5;
            margin-bottom: 14px;
        }

        /* 风味雷达 */
        .flavor-bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            gap: 8px;
        }

        .flavor-label {
            font-size: 12px;
            color: var(--text2);
            width: 28px;
            text-align: right;
        }

        .flavor-bar-bg {
            flex: 1;
            height: 6px;
            background: var(--surface2);
            border-radius: 3px;
            overflow: hidden;
        }

        .flavor-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .flavor-bar-fill.sweet { background: #f0a050; }
        .flavor-bar-fill.sour { background: #50c878; }
        .flavor-bar-fill.bitter { background: #8060d0; }
        .flavor-bar-fill.salty { background: #50a0e0; }
        .flavor-bar-fill.umami { background: #e06070; }

        /* 标签行 */
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }

        .card-tag {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            background: var(--surface2);
            color: var(--text2);
        }

        .card-tag.spirit {
            background: rgba(240,160,80,0.12);
            color: var(--accent);
        }

        /* 详情弹窗 */
        .detail-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10,10,15,0.9);
            z-index: 200;
            overflow-y: auto;
            padding: 20px;
        }

        .detail-overlay.active {
            display: block;
        }

        .detail-card {
            max-width: 480px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            position: relative;
        }

        .detail-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--surface2);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            color: var(--text);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .detail-name {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .detail-name-en {
            font-size: 14px;
            color: var(--text2);
            margin-bottom: 16px;
        }

        .detail-section {
            margin-bottom: 20px;
        }

        .detail-section-title {
            font-size: 13px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-ingredients {
            list-style: none;
        }

        .detail-ingredients li {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 14px;
        }

        .detail-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .detail-info-item {
            background: var(--surface2);
            border-radius: 12px;
            padding: 12px;
        }

        .detail-info-item .label {
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 4px;
        }

        .detail-info-item .value {
            font-size: 15px;
            font-weight: 600;
        }

        .detail-desc {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text2);
        }

        /* 开始定制按钮 */
        .btn-customize {
            width: 100%;
            margin-top: 24px;
            padding: 14px 0;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            letter-spacing: 2px;
        }

        .btn-customize:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        /* 定制面板 */
        .customize-panel {
            display: none;
        }

        .customize-panel.active {
            display: block;
        }

        .customize-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .customize-back {
            background: var(--surface2);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .customize-title {
            font-size: 18px;
            font-weight: 700;
        }

        .customize-product {
            background: var(--surface2);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .customize-product-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            flex-shrink: 0;
        }

        .customize-product-info .cp-name {
            font-size: 15px;
            font-weight: 600;
        }

        .customize-product-info .cp-en {
            font-size: 12px;
            color: var(--text2);
        }

        /* 上传区域 */
        .upload-area {
            background: var(--surface2);
            border: 2px dashed rgba(240,160,80,0.25);
            border-radius: 16px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .upload-area:active {
            border-color: var(--accent);
            background: rgba(240,160,80,0.05);
        }

        .upload-area.has-image {
            padding: 16px;
            border-style: solid;
            border-color: rgba(240,160,80,0.3);
        }

        .upload-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(240,160,80,0.1);
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--accent);
        }

        .upload-text {
            font-size: 14px;
            color: var(--text);
            margin-bottom: 4px;
        }

        .upload-hint {
            font-size: 12px;
            color: var(--text2);
        }

        .upload-preview {
            display: none;
            position: relative;
        }

        .upload-preview.active {
            display: block;
        }

        .upload-preview img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 12px;
        }

        .upload-preview-remove {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            background: rgba(0,0,0,0.7);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 生成按钮 */
        .btn-generate {
            width: 100%;
            padding: 14px 0;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .btn-generate:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-generate:active:not(:disabled) {
            transform: scale(0.97);
        }

        /* 生成中 */
        .generating {
            text-align: center;
            padding: 40px 20px;
        }

        .generating-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--surface2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .generating-text {
            font-size: 14px;
            color: var(--text2);
        }

        /* 生成结果 */
        .mockup-result {
            display: none;
            margin-bottom: 20px;
        }

        .mockup-result.active {
            display: block;
        }

        .mockup-result img {
            width: 100%;
            border-radius: 12px;
        }

        .mockup-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .btn-download-mockup {
            flex: 1;
            padding: 12px 0;
            background: var(--surface2);
            border: 1px solid rgba(240,160,80,0.2);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
        }

        .btn-redo-mockup {
            flex: 1;
            padding: 12px 0;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
        }

        /* API 未配置提示 */
        .api-notice {
            background: rgba(240,160,80,0.08);
            border: 1px solid rgba(240,160,80,0.15);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 16px;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text2);
        }

        .api-notice strong {
            color: var(--accent);
        }

        /* 动画 */
        .fade-in {
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 输入工具栏 */
        .input-toolbar {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-tool {
            background: var(--surface2);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 16px;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            user-select: none;
            padding: 0;
        }

        .btn-tool:active {
            background: rgba(240,160,80,0.15);
            border-color: var(--accent);
        }

        .btn-tool.recording {
            background: rgba(224,96,112,0.2);
            border-color: var(--accent2);
            color: var(--accent2);
        }

        /* 声波图标 */
        .voice-wave {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 16px;
        }

        .voice-wave span {
            display: block;
            width: 3px;
            background: currentColor;
            border-radius: 2px;
            height: 6px;
            transition: height 0.15s ease;
        }

        .recording .voice-wave span {
            animation: wave-bounce 0.8s ease-in-out infinite;
        }

        .recording .voice-wave span:nth-child(1) { animation-delay: 0s; }
        .recording .voice-wave span:nth-child(2) { animation-delay: 0.12s; }
        .recording .voice-wave span:nth-child(3) { animation-delay: 0.24s; }
        .recording .voice-wave span:nth-child(4) { animation-delay: 0.36s; }
        .recording .voice-wave span:nth-child(5) { animation-delay: 0.48s; }

        @keyframes wave-bounce {
            0%, 100% { height: 6px; }
            50% { height: 16px; }
        }

        /* 图片预览 */
        .image-preview-area {
            display: none;
            margin-top: 12px;
            position: relative;
        }

        .image-preview-area.active {
            display: block;
        }

        .image-preview-wrapper {
            display: inline-block;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(240,160,80,0.2);
        }

        .image-preview-wrapper img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            display: block;
        }

        .image-preview-remove {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 22px;
            height: 22px;
            background: rgba(0,0,0,0.7);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-preview-hint {
            font-size: 11px;
            color: var(--text2);
            margin-top: 6px;
        }

        /* 语音状态提示 */
        .voice-status {
            font-size: 12px;
            color: var(--accent2);
            margin-top: 4px;
            display: none;
        }

        .voice-status.active {
            display: block;
        }

        /* 响应式 */
        @media (min-width: 600px) {
            .page-home {
                padding-top: 100px;
            }
        }
    </style>
</head>
<body>

<!-- 首页 -->

<script>
// ========== 数据库（内嵌） ==========
const COCKTAILS = []; // 将由外部 JSON 加载

// ========== AI 解析逻辑（本地增强版） ==========
function parseUserInput(text) {
    const result = {
        taste: { sweet: 0, sour: 0, bitter: 0, salty: 0, umami: 0 },
        aroma: [],
        color: [],
        mouthfeel: [],
        strength: '',
        base_spirit: [],
        occasion: [],
        temperature: '',
        vibe: ''
    };

    // 味道关键词 → 分值
    const tasteMap = {
        sweet: { words: ['甜','甜的','甜口','甜甜','糖','蜜','蜂蜜','糖浆','焦糖','枫糖'], score: 4 },
        sour: { words: ['酸','酸的','酸口','柠檬','青柠','柑橘','酸橙','柚子','酸梅'], score: 4 },
        bitter: { words: ['苦','苦的','苦口','金巴利','开胃','苦艾','咖啡'], score: 4 },
        salty: { words: ['咸','盐','盐边','咸味'], score: 4 },
        umami: { words: ['鲜','醇','浓厚','陈年','醇厚','深沉'], score: 4 }
    };

    for (const [taste, cfg] of Object.entries(tasteMap)) {
        for (const kw of cfg.words) {
            if (text.includes(kw)) {
                const boost = (text.includes('偏') || text.includes('一点') || text.includes('微')) ? 3 : cfg.score;
                result.taste[taste] = Math.max(result.taste[taste], boost);
            }
        }
    }

    // 复合味推理
    if (text.includes('酸甜')) { result.taste.sweet = Math.max(result.taste.sweet, 3); result.taste.sour = Math.max(result.taste.sour, 3); }
    if (text.includes('苦甜')) { result.taste.bitter = Math.max(result.taste.bitter, 3); result.taste.sweet = Math.max(result.taste.sweet, 2); }

    // 香气
    const aromaMap = {
        citrus: ['柑橘','柠檬','柚子','橙','佛手柑','青柠','西柚','橙皮'],
        floral: ['花','花香','玫瑰','薰衣草','接骨木','紫罗兰','樱花','茉莉'],
        herbal: ['草','草本','薄荷','罗勒','杜松子','植物','迷迭香','百里香','艾草'],
        spicy: ['香料','肉桂','姜','丁香','豆蔻','辣','胡椒','姜汁'],
        fruity: ['果','果味','果香','水果','浆果','热带','芒果','菠萝','百香果','桃','苹果','香蕉','椰子','椰','荔枝','西瓜','莓','蔓越莓','石榴'],
        smoky: ['烟熏','泥煤','烟','烤','熏','艾雷'],
        nutty: ['坚果','杏仁','核桃','榛子','榛果','开心果'],
        coffee: ['咖啡','浓缩','espresso'],
        sweet: ['甜酒','香草','焦糖','蜂蜜','糖浆','vanilla','caramel']
    };
    for (const [key, words] of Object.entries(aromaMap)) {
        for (const w of words) { if (text.includes(w) && !result.aroma.includes(key)) { result.aroma.push(key); break; } }
    }

    // 颜色
    const colorMap = {
        red: ['红','粉','粉色','红色','玫红','酒红','樱桃','草莓','蔓越莓','紫'],
        gold: ['金','琥珀','棕色','黄','焦糖色','金色','铜色'],
        blue: ['蓝','蓝色','蓝柑'],
        green: ['绿','绿色','薄荷绿','抹茶','翡翠'],
        orange: ['橙','橙色','橘色','日落'],
        layered: ['渐变','分层','彩虹','渐变色'],
        white: ['白','乳白','奶白','椰奶','奶','雪白','透明','清澈','clear'],
        brown: ['深色','暗','黑','深棕','咖啡色','棕色'],
        pink: ['粉红','粉','少女','桃粉']
    };
    for (const [key, words] of Object.entries(colorMap)) {
        for (const w of words) { if (text.includes(w) && !result.color.includes(key)) { result.color.push(key); break; } }
    }

    // 口感
    const mouthfeelMap = {
        crisp: ['清爽','清脆','干净','利落','干','冰爽','凉爽','清冽','清透','解渴','解腻'],
        smooth: ['顺滑','圆润','柔和','丝滑','温和','绵柔','柔顺'],
        creamy: ['奶','绵密','浓稠','奶油','椰奶','丝绒','慕斯'],
        sharp: ['锐利','烈','刺激','劲大','辛烈','凛冽'],
        hot: ['辣','辛','灼热','烧','辛辣','暖身'],
        bubbly: ['气泡','苏打','碳酸','起泡','气泡感']
    };
    for (const [key, words] of Object.entries(mouthfeelMap)) {
        for (const w of words) { if (text.includes(w) && !result.mouthfeel.includes(key)) { result.mouthfeel.push(key); break; } }
    }

    // 烈度
    const strengthMap = {
        light: ['不会喝','轻','低度','度数低','别太高','无酒精','不喝酒','不要酒'],
        mild: ['微醺','小酌','好入口','容易喝','轻度','温柔','初学者'],
        medium: ['适中','中等','刚好'],
        strong: ['烈','烈的','够劲','酒感强','浓烈','高度'],
        'very-strong': ['非常烈','最烈的','一杯倒','特别烈','极致']
    };
    for (const [key, words] of Object.entries(strengthMap)) {
        for (const w of words) { if (text.includes(w)) { result.strength = key; break; } }
    }

    // 基酒
    const spiritMap = {
        gin: ['金酒','杜松子','琴酒'],
        vodka: ['伏特加'],
        rum: ['朗姆','兰姆'],
        tequila: ['龙舌兰','特基拉','梅斯卡尔'],
        whiskey: ['威士忌','波本','黑麦','苏格兰'],
        brandy: ['白兰地','干邑','雅文邑'],
        wine: ['葡萄酒','起泡酒','香槟','梅酒','清酒'],
        liqueur: ['利口酒','甜酒','百利甜','君度'],
        'non-alcoholic': ['无酒精','不喝酒','不要酒','mocktail']
    };
    for (const [key, words] of Object.entries(spiritMap)) {
        for (const w of words) { if (text.includes(w) && !result.base_spirit.includes(key)) { result.base_spirit.push(key); break; } }
    }

    // 场合
    const occasionMap = {
        aperitif: ['餐前','开胃','饭前','正餐前'],
        digestif: ['餐后','消化','饭后','夜宵'],
        party: ['派对','聚会','闺蜜','朋友','社交','蹦迪','狂欢'],
        summer: ['夏天','海边','热','消暑','夏日','泳池','沙滩'],
        winter: ['冬天','暖','冷','寒冷','冬日','圣诞','围炉'],
        solo: ['一个人','独处','自己','累','下班','放松','独饮','宅'],
        date: ['约会','浪漫','两人','情侣','纪念日','暧昧'],
        classic: ['经典','老派','复古','传统']
    };
    for (const [key, words] of Object.entries(occasionMap)) {
        for (const w of words) { if (text.includes(w) && !result.occasion.includes(key)) { result.occasion.push(key); break; } }
    }

    // 温度
    if (text.includes('热') || text.includes('暖') || text.includes('加热')) result.temperature = 'hot';
    if (text.includes('冰') || text.includes('冷') || text.includes('冻') || text.includes('加冰')) result.temperature = 'cold';

    // === 语义推理 ===
    if (text.includes('拍照') || text.includes('好看') || text.includes('颜值') || text.includes('出片')) {
        if (!result.color.length) result.color = ['red', 'layered', 'blue'];
        if (!result.occasion.includes('party')) result.occasion.push('party');
    }
    if (text.includes('度假') || text.includes('海滩') || text.includes('热带') || text.includes('海岛')) {
        if (!result.occasion.includes('summer')) result.occasion.push('summer');
        if (!result.mouthfeel.includes('crisp')) result.mouthfeel.push('crisp');
        if (!result.aroma.includes('fruity')) result.aroma.push('fruity');
    }
    if (text.includes('女生') || text.includes('闺蜜') || text.includes('姐妹')) {
        if (result.taste.sweet === 0) result.taste.sweet = 3;
        if (!result.occasion.includes('party')) result.occasion.push('party');
    }
    if (text.includes('微醺') && !result.strength) result.strength = 'mild';
    if (text.includes('甜品') || text.includes('甜点') || text.includes('像吃蛋糕') || text.includes('像甜品')) {
        result.taste.sweet = Math.max(result.taste.sweet, 4);
        if (!result.mouthfeel.includes('creamy')) result.mouthfeel.push('creamy');
    }
    if (text.includes('椰子') || text.includes('椰奶') || text.includes('奶味')) {
        if (!result.aroma.includes('nutty')) result.aroma.push('nutty');
        if (!result.mouthfeel.includes('creamy')) result.mouthfeel.push('creamy');
    }
    if (text.includes('薄荷') || text.includes('mint')) {
        if (!result.aroma.includes('herbal')) result.aroma.push('herbal');
        if (!result.mouthfeel.includes('crisp')) result.mouthfeel.push('crisp');
    }
    if (text.includes('咖啡') || text.includes('espresso')) {
        result.taste.bitter = Math.max(result.taste.bitter, 3);
        if (!result.aroma.includes('coffee')) result.aroma.push('coffee');
    }
    // 如果用户完全没给方向，给一个宽泛 baseline
    const hasAnyPreference = Object.values(result.taste).some(v => v > 0)
        || result.aroma.length > 0 || result.mouthfeel.length > 0
        || result.strength || result.base_spirit.length > 0 || result.occasion.length > 0;
    if (!hasAnyPreference) {
        result.taste.sweet = 2;
        result.taste.sour = 1;
    }

    return result;
}

// ========== 名称直接匹配 ==========
function matchByName(text, cocktails) {
    const t = text.trim().toLowerCase();
    if (!t) return [];

    // 构建名称索引：中文名、英文名、常见别名
    const nameMap = [
        // 中文名 → 别名/常见叫法
        ['马天尼', ['马提尼', '马丁尼', 'martini']],
        ['尼格罗尼', ['内格罗尼', 'negroni']],

        ['曼哈顿', ['manhattan']],
        ['得其利', ['代基里', '大吉利', 'daiquiri']],
        ['莫吉托', ['mojito']],
        ['玛格丽特', ['margarita']],
        ['龙舌兰日出', ['tequila sunrise']],
        ['帕洛玛', ['paloma']],
        ['边车', ['sidecar']],
        ['血腥玛丽', ['bloody mary']],
        ['莫斯科骡子', ['moscow mule']],
        ['螺丝刀', ['screwdriver']],
        ['黑俄罗斯', ['black russian']],
        ['白俄罗斯', ['white russian']],
        ['新加坡司令', ['singapore sling']],
        ['长岛冰茶', ['long island', 'long island iced tea']],
        ['椰林飘香', ['pina colada', 'piña colada']],
        ['迈泰', ['mai tai']],

        ['蓝色夏威夷', ['blue hawaii']],
        ['蓝色珊瑚', ['blue lagoon']],
        ['爱尔兰咖啡', ['irish coffee']],
        ['汤姆柯林斯', ['tom collins']],
        ['金汤力', ['gin and tonic', '金汤', 'gin tonic']],
        ['威士忌酸', ['whiskey sour', 'whisky sour']],
        ['薄荷朱利普', ['mint julep']],
        ['僵尸', ['zombie']],
        ['飓风', ['hurricane']],
        ['古巴自由', ['cuba libre']],
        ['黛绮莉', ['daiquiri']],
        ['教父', ['godfather']],
        ['教母', ['godmother']],
        ['内格罗恩', ['naked and famous']],
        ['伏魔使者', ['corpse reviver']],
        ['床第之间', ['between the sheets']],
        ['香槟鸡尾酒', ['champagne cocktail']],
        ['罗伯罗伊', ['rob roy']],
        ['杜松子司令', ['gimlet']],
        ['干金酒', ['gin and tonic', 'g&t']],
        ['布 Boulevardier', ['boulevardier']],
        ['黑麦酸', ['rye sour']],
        ['威士忌嗨棒', ['whiskey highball']],
        ['金酒嗨棒', ['gin rickey']],
        ['巴黎咖啡', ['parisian blonde']],
        ['马提尼', ['vesper']],
        ['阿拉伯沙漠', ['arabian desert']],
        ['富士山', ['mt fuji', 'mount fuji']],
        ['清酒嗨棒', ['sake highball']],
        ['柚子青柠', ['yuzu sour']],
        ['乌梅苏打', ['umeshu soda']],
        ['紫薯拿铁', ['ube latte']],
        ['伯爵夫人', ['earl grey teani']],
    ];

    const results = [];

    for (const c of cocktails) {
        let matched = false;
        let matchScore = 100; // 名称直接匹配默认满分

        // 1. 精确匹配中文名
        if (c.name_cn && t === c.name_cn.toLowerCase()) {
            matched = true;
            matchScore = 100;
        }
        // 2. 精确匹配英文名
        else if (c.name_en && t === c.name_en.toLowerCase()) {
            matched = true;
            matchScore = 100;
        }
        // 3. 输入包含中文名
        else if (c.name_cn && t.includes(c.name_cn.toLowerCase())) {
            matched = true;
            matchScore = 98;
        }
        // 4. 输入包含英文名
        else if (c.name_en && t.includes(c.name_en.toLowerCase())) {
            matched = true;
            matchScore = 98;
        }
        // 5. 中文名包含输入
        else if (c.name_cn && c.name_cn.toLowerCase().includes(t)) {
            matched = true;
            matchScore = 95;
        }
        // 6. 英文名包含输入
        else if (c.name_en && c.name_en.toLowerCase().includes(t)) {
            matched = true;
            matchScore = 95;
        }

        // 7. 别名匹配
        if (!matched) {
            for (const entry of nameMap) {
                if (c.name_cn === entry[0]) {
                    for (const alias of entry[1]) {
                        if (t.includes(alias.toLowerCase()) || alias.toLowerCase().includes(t)) {
                            matched = true;
                            matchScore = 92;
                            break;
                        }
                    }
                    if (matched) break;
                }
            }
        }

        if (matched) {
            results.push({ ...c, matchScore });
        }
    }

    return results.sort((a, b) => b.matchScore - a.matchScore);
}

// ========== 匹配算法（增强版） ==========
function matchCocktails(userProfile, cocktails, limit = 8) {
    // 字段别名映射（数据库值 → 标准key）
    const aromaAlias = { 'grapefruit': 'citrus', 'bergamot': 'citrus', 'anise': 'herbal', 'oak': 'smoky', 'cream': 'nutty', 'plum': 'fruity', 'cherry': 'fruity', 'vanilla': 'sweet', 'tropical': 'fruity', 'rice': 'earthy' };
    const colorAlias = { 'brown': 'gold', 'clear': 'white', 'purple': 'red', 'pink': 'red', 'yellow': 'gold' };
    const mouthfeelAlias = { 'astringent': 'sharp', 'rich': 'smooth', 'bubbly': 'crisp', 'fruity': 'smooth', 'thin': 'crisp' };
    const spiritAlias = { 'sake': 'wine', 'mezcal': 'tequila' };

    function normalizeList(list, aliasMap) {
        if (!list) return [];
        return list.map(v => aliasMap[v] || v);
    }

    const scored = cocktails.map(c => {
        let score = 0;
        let maxScore = 0;

        // 标准化数据库字段
        const cAroma = normalizeList(c.aroma, aromaAlias);
        const cColor = normalizeList(c.color, colorAlias);
        const cMouthfeel = normalizeList(c.mouthfeel, mouthfeelAlias);
        const cSpirit = normalizeList(c.base_spirit, spiritAlias);

        // 五味匹配（权重最高）
        const tasteKeys = ['sweet', 'sour', 'bitter', 'salty', 'umami'];
        let tasteHits = 0;
        for (const key of tasteKeys) {
            const userVal = userProfile.taste[key];
            const cocktailVal = c.taste[key] || 0;
            if (userVal > 0) {
                maxScore += 5;
                const diff = Math.abs(userVal - cocktailVal);
                score += Math.max(0, 5 - diff);
                if (diff <= 1) tasteHits++;
            }
        }

        // 香气匹配
        if (userProfile.aroma.length > 0) {
            maxScore += 3;
            const overlap = userProfile.aroma.filter(a => cAroma.includes(a));
            score += overlap.length / userProfile.aroma.length * 3;
        }

        // 颜色匹配
        if (userProfile.color.length > 0) {
            maxScore += 2;
            const userColors = userProfile.color.map(c => colorAlias[c] || c);
            const overlap = userColors.filter(a => cColor.includes(a));
            score += overlap.length / userColors.length * 2;
        }

        // 口感匹配
        if (userProfile.mouthfeel.length > 0) {
            maxScore += 2;
            const userMouth = userProfile.mouthfeel.map(m => mouthfeelAlias[m] || m);
            const overlap = userMouth.filter(a => cMouthfeel.includes(a));
            score += overlap.length / userMouth.length * 2;
        }

        // 烈度匹配
        if (userProfile.strength) {
            maxScore += 2;
            if (c.strength === userProfile.strength) score += 2;
            else {
                const order = ['light', 'mild', 'medium', 'strong', 'very-strong'];
                const diff = Math.abs(order.indexOf(c.strength) - order.indexOf(userProfile.strength));
                if (diff === 1) score += 1;
            }
        }

        // 基酒匹配
        if (userProfile.base_spirit.length > 0) {
            maxScore += 2;
            const userSpirits = userProfile.base_spirit.map(s => spiritAlias[s] || s);
            const overlap = userSpirits.filter(a => cSpirit.includes(a));
            score += overlap.length / userSpirits.length * 2;
        }

        // 场景匹配
        if (userProfile.occasion.length > 0) {
            maxScore += 1;
            const cOccasion = c.occasion || [];
            const overlap = userProfile.occasion.filter(a => cOccasion.includes(a));
            score += overlap.length / userProfile.occasion.length * 1;
        }

        const matchPercent = maxScore > 0 ? Math.round(score / maxScore * 100) : 0;

        return { ...c, matchScore: matchPercent };
    });

    return scored
        .filter(c => c.matchScore > 10)
        .sort((a, b) => b.matchScore - a.matchScore)
        .slice(0, limit);
}

// ========== AI 评语生成 ==========
function generateAIComment(userProfile, results, hasImage = false, isNameMatch = false) {
    const tasteDesc = [];
    if (userProfile.taste.sweet >= 3) tasteDesc.push('甜');
    if (userProfile.taste.sour >= 3) tasteDesc.push('酸');
    if (userProfile.taste.bitter >= 3) tasteDesc.push('苦');
    if (tasteDesc.length === 0) tasteDesc.push('均衡');

    const aromaDesc = userProfile.aroma.length > 0 
        ? userProfile.aroma.slice(0, 2).map(a => {
            const map = {citrus:'柑橘',floral:'花香',herbal:'草本',spicy:'香料',fruity:'果香',smoky:'烟熏',nutty:'坚果',earthy:'泥土',coffee:'咖啡',sweet:'甜香'};
            return map[a] || a;
        }).join('和') + '调'
        : '';

    if (results.length === 0) {
        return '没找到完美匹配的酒款，试试换个说法？比如告诉我你偏好的口味、想要的氛围，或者喜欢的基酒。';
    }

    const top = results[0];
    let comment = '';
    
    // 名称直接匹配时的评语
    if (isNameMatch) {
        comment = `「${top.name_cn}」${top.name_en ? '(' + top.name_en + ')' : ''}——${top.description}。`;
        // 补充风味速览
        const spiritNames = {gin:'金酒',vodka:'伏特加',rum:'朗姆酒',tequila:'龙舌兰',whiskey:'威士忌',brandy:'白兰地',wine:'葡萄酒',sake:'清酒',mezcal:'梅斯卡尔'};
        const spirits = (top.base_spirit || []).map(s => spiritNames[s] || s).join('和');
        if (spirits) comment += ` 基酒：${spirits}。`;
        const strengthNames = {light:'轻柔',mild:'温和',medium:'中等',strong:'强劲','very-strong':'烈性'};
        if (top.strength) comment += ` 烈度：${strengthNames[top.strength] || top.strength}。`;
        if (results.length > 1) {
            comment += ` 你可能还想试试这些相似风格 👇`;
        }
        return comment;
    }
    
    if (hasImage) {
        comment = `📷 从图片中捕捉到${userProfile.color.length > 0 ? userProfile.color.map(c => ({red:'红调',gold:'金调',blue:'蓝调',green:'绿调',orange:'橙调',white:'白色系',layered:'渐变'})[c] || c).join('和') + '，' : ''}`;
        if (tasteDesc.some(t => t !== '均衡')) {
            comment += `搭配${tasteDesc.join('')}口感，`;
        }
        comment += `首推「${top.name_cn}」——${top.description}。`;
    } else {
        comment = `听起来你想要${tasteDesc.join('')}为主的${aromaDesc ? aromaDesc + '，' : ''}风格。首推「${top.name_cn}」——${top.description}。`;
    }
    
    if (results.length > 1) {
        comment += ` 下面还有${results.length - 1}款风格相近的选择，可以都看看 👇`;
    }

    return comment;
}

// ========== 渲染 ==========
function renderResults(results, aiComment) {
    const container = document.getElementById('resultsContainer');
    container.innerHTML = '';

    // AI 评语
    const aiCommentEl = document.getElementById('aiComment');
    const aiCommentText = document.getElementById('aiCommentText');
    if (aiComment) {
        aiCommentText.textContent = aiComment;
        aiCommentEl.style.display = 'block';
    } else {
        aiCommentEl.style.display = 'none';
    }

    if (results.length === 0) {
        container.innerHTML = `
            <div style="text-align:center;padding:60px 20px;color:var(--text2);">
                <div style="font-size:48px;margin-bottom:16px;">🤔</div>
                <div style="font-size:16px;margin-bottom:8px;">没找到匹配的酒款</div>
                <div style="font-size:14px;">换个说法试试？</div>
            </div>
        `;
        return;
    }

    results.forEach((c, i) => {
        const card = document.createElement('div');
        card.className = 'cocktail-card fade-in';
        card.style.animationDelay = `${i * 0.1}s`;

        const flavorBars = ['sweet', 'sour', 'bitter', 'salty', 'umami'].map(key => {

            if (val === 0) return '';
            const labels = {sweet:'甜',sour:'酸',bitter:'苦',salty:'咸',umami:'鲜'};
            return `
                <div class="flavor-bar-row">
                    <span class="flavor-label">${labels[key]}</span>
                    <div class="flavor-bar-bg">
                        <div class="flavor-bar-fill ${key}" style="width:${val * 20}%"></div>
                    </div>
                </div>
            `;
        }).join('');

        const tags = [
            ...(c.base_spirit || []).map(s => `<span class="card-tag spirit">${s}</span>`),
            ...(c.aroma || []).slice(0, 3).map(a => `<span class="card-tag">${a}</span>`),
            ...(c.mouthfeel || []).slice(0, 2).map(m => `<span class="card-tag">${m}</span>`),
        ].join('');

        card.innerHTML = `
            <div class="card-top">
                <div>
                    <div class="card-name">${c.name_cn}</div>
                    <div class="card-name-en">${c.name_en}</div>
                </div>
                <div class="match-score">${c.matchScore}% 匹配</div>
            </div>

// ========== 样机生成 ==========
async function generateMockup(cocktail, imageBase64) {
    // 自动检测后端地址：通过服务器访问时用当前域，直接打开文件时用 localhost
    const API_BASE = window.location.protocol === 'file:'
        ? 'http://localhost:3000'
        : window.location.origin;

    // 先压缩图片（原图可能很大，压缩到 1024px 加快传输）
    const resizedImage = await resizeImageForAPI(imageBase64, 1024);

    // 调用后端图片生成 API
    try {
        const resp = await fetch(`${API_BASE}/api/generate-mockup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                cocktail_name: cocktail.name_cn,
                cocktail_name_en: cocktail.name_en || '',
                volume: '275ml',
                alcohol: '16% vol',
                image: resizedImage
            })
        });

        const data = await resp.json();

        if (!resp.ok) {
            throw new Error(data.error || '生成失败');
        }

        if (data.image_url) {
            return data.image_url;
        }

        throw new Error('未获取到图片');
    } catch (err) {
        console.error('图片生成失败:', err);

        // 如果是网络错误，给出明确提示
        if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError') || err.message.includes('fetch')) {
            throw new Error('无法连接图片生成服务，请确保后端已启动（npm start）并配置了 ARK_API_KEY');
        }

        throw err;
    }
}

// 客户端图片压缩：缩小尺寸 + 降低质量，减少传输时间
function resizeImageForAPI(base64, maxSize) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
            let w = img.width, h = img.height;
            if (w > maxSize || h > maxSize) {
                const ratio = Math.min(maxSize / w, maxSize / h);
                w = Math.round(w * ratio);
                h = Math.round(h * ratio);
            }
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.85));
        };
        img.onerror = () => resolve(base64);
        img.src = base64;
    });
}

// 兼容性圆角矩形绘制
function drawRoundRect(ctx, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
}

// Canvas 简易样机预览（未接入 AI 时的降级方案）
function generateMockupCanvas(cocktail, imageBase64) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const W = 800, H = 1100;
            canvas.width = W;
            canvas.height = H;
            const ctx = canvas.getContext('2d');

            // 背景
            const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
            bgGrad.addColorStop(0, '#e8f5e9');
            bgGrad.addColorStop(1, '#f5f0e0');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, W, H);

            // 瓶身轮廓
            const bottleLeft = 220, bottleRight = 580;
            const bottleTop = 80, bottleBottom = 980;
            const neckLeft = 340, neckRight = 460;
            const neckTop = 20;

            // 瓶颈
            ctx.beginPath();
            ctx.moveTo(neckLeft, bottleTop);
            ctx.lineTo(neckLeft, neckTop + 30);
            ctx.quadraticCurveTo(neckLeft, neckTop, neckLeft + 20, neckTop);
            ctx.lineTo(neckRight - 20, neckTop);
            ctx.quadraticCurveTo(neckRight, neckTop, neckRight, neckTop + 30);
            ctx.lineTo(neckRight, bottleTop);
            ctx.closePath();
            ctx.fillStyle = 'rgba(200, 230, 210, 0.4)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(180, 200, 190, 0.6)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 软木塞
            ctx.fillStyle = '#c4956a';
            ctx.beginPath();
            drawRoundRect(ctx, neckLeft + 5, neckTop - 18, neckRight - neckLeft - 10, 22, 4);
            ctx.fill();

            // 瓶身
            ctx.beginPath();
            ctx.moveTo(bottleLeft, bottleBottom);
            ctx.lineTo(bottleLeft, bottleTop + 40);
            ctx.quadraticCurveTo(bottleLeft, bottleTop, bottleLeft + 30, bottleTop);
            ctx.lineTo(neckLeft, bottleTop);
            ctx.lineTo(neckRight, bottleTop);
            ctx.lineTo(bottleRight - 30, bottleTop);
            ctx.quadraticCurveTo(bottleRight, bottleTop, bottleRight, bottleTop + 40);
            ctx.lineTo(bottleRight, bottleBottom);
            ctx.closePath();

            // 玻璃效果
            const glassGrad = ctx.createLinearGradient(bottleLeft, 0, bottleRight, 0);
            glassGrad.addColorStop(0, 'rgba(200, 235, 215, 0.35)');
            glassGrad.addColorStop(0.3, 'rgba(220, 245, 230, 0.2)');
            glassGrad.addColorStop(0.7, 'rgba(220, 245, 230, 0.2)');
            glassGrad.addColorStop(1, 'rgba(180, 210, 195, 0.35)');
            ctx.fillStyle = glassGrad;
            ctx.fill();
            ctx.strokeStyle = 'rgba(180, 200, 190, 0.5)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 标签区域：用户照片作为背景
            const labelLeft = bottleLeft + 20;
            const labelRight = bottleRight - 20;
            const labelTop = bottleTop + 120;
            const labelBottom = bottleBottom - 80;
            const labelW = labelRight - labelLeft;
            const labelH = labelBottom - labelTop;

            ctx.save();
            ctx.beginPath();
            drawRoundRect(ctx, labelLeft, labelTop, labelW, labelH, 6);
            ctx.clip();

            // 绘制用户照片（覆盖整个标签区域）
            const imgRatio = img.width / img.height;
            const labelRatio = labelW / labelH;
            let sx = 0, sy = 0, sw = img.width, sh = img.height;
            if (imgRatio > labelRatio) {
                sw = img.height * labelRatio;
                sx = (img.width - sw) / 2;
            } else {
                sh = img.width / labelRatio;
                sy = (img.height - sh) / 2;
            }
            ctx.drawImage(img, sx, sy, sw, sh, labelLeft, labelTop, labelW, labelH);

            // 半透明底条 - 顶部品牌
            const barH = 36;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
            ctx.fillRect(labelLeft, labelTop, labelW, barH);

            // 品牌名
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 22px "PingFang SC", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('Life In.', labelLeft + labelW / 2, labelTop + barH / 2);

            // 半透明底条 - 底部产品信息
            const bottomBarH = 52;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
            ctx.fillRect(labelLeft, labelBottom - bottomBarH, labelW, bottomBarH);

            // 产品名
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 18px "PingFang SC", sans-serif';
            ctx.fillText(cocktail.name_cn, labelLeft + labelW / 2, labelBottom - bottomBarH + 22);

            // 规格
            ctx.font = '13px "PingFang SC", sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fillText('275ml | 16% vol', labelLeft + labelW / 2, labelBottom - bottomBarH + 42);

            ctx.restore();

            // 玻璃高光
            ctx.beginPath();
            ctx.moveTo(bottleLeft + 15, bottleTop + 60);
            ctx.lineTo(bottleLeft + 15, bottleBottom - 20);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.stroke();

            resolve(canvas.toDataURL('image/png'));
        };
        img.onerror = () => resolve(null);
        img.src = imageBase64;
    });
}

function doSearch() {
    const text = userInput.value.trim();
    const hasImage = !!uploadedImageBase64;
    if (!text && !hasImage) return;

    loading.classList.add('active');

    // 如果有图片，先做本地主色调提取辅助匹配
    let imageColorHint = null;
    if (hasImage) {
        imageColorHint = extractDominantColor(uploadedImageBase64);
    }

    // 模拟 AI 处理延迟
    setTimeout(() => {
        // 优先：名称直接匹配
        let results = text ? matchByName(text, COCKTAIL_DB) : [];
        let profile = null;
        let isNameMatch = false;

        if (results.length > 0) {
            // 命中名称，直接用匹配结果，同时解析 profile 供评语使用
            isNameMatch = true;
            profile = parseUserInput(text);
        } else {
            // 未命中名称，走风味维度匹配
            profile = parseUserInput(text);
            
            // 如果有图片色提取结果，补充到 profile
            if (imageColorHint && profile.color.length === 0) {
                profile.color = imageColorHint;
            }

        const aiComment = generateAIComment(profile, results, hasImage, isNameMatch);

        pageHome.style.display = 'none';
        pageResults.classList.add('active');

        } else if (hasImage) {

        } else {
            headerText = `为「${text.slice(0, 15)}${text.length > 15 ? '...' : ''}」推荐`;
        }
        document.getElementById('resultsHeaderText').textContent = headerText;

        renderResults(results, aiComment);
        loading.classList.remove('active');
    }, 800);
}

// ========== 图片主色调提取（本地简易版） ==========
function extractDominantColor(imageSrc) {
    try {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.src = imageSrc;
        
        canvas.width = 50;
        canvas.height = 50;
        ctx.drawImage(img, 0, 0, 50, 50);
        
        const data = ctx.getImageData(0, 0, 50, 50).data;
        let rSum = 0, gSum = 0, bSum = 0, count = 0;
        
        for (let i = 0; i < data.length; i += 4) {
            rSum += data[i];
            gSum += data[i + 1];
            bSum += data[i + 2];
            count++;
        }
        
        const rAvg = rSum / count;
        const gAvg = gSum / count;
        const bAvg = bSum / count;
        
        // 简单颜色映射
        const colors = [];
        if (rAvg > 150 && gAvg < 120) colors.push('red');
        if (rAvg > 180 && gAvg > 120 && bAvg < 100) colors.push('orange');
        if (rAvg > 150 && gAvg > 150 && bAvg < 100) colors.push('gold');
        if (gAvg > 150 && rAvg < 100) colors.push('green');
        if (bAvg > 150 && rAvg < 100) colors.push('blue');
        if (rAvg > 150 && gAvg > 150 && bAvg > 150) colors.push('white');
        if (colors.length === 0) colors.push('gold');
        
        return colors;
    } catch (e) {
        return ['gold'];
    }
}

// ========== 语音输入 ==========
let isRecording = false;
let recognition = null;
const btnVoice = document.getElementById('btnVoice');
const voiceStatus = document.getElementById('voiceStatus');

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';
    recognition.interimResults = true;
    recognition.continuous = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
        isRecording = true;
        btnVoice.classList.add('recording');
        voiceStatus.classList.add('active');
    };

    recognition.onresult = (event) => {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
        }
        // 追加到输入框，不覆盖已有文字
        const current = userInput.value.trim();
        userInput.value = current ? current + '，' + transcript : transcript;
        charCount.textContent = `${userInput.value.length}/200`;
        btnSearch.disabled = userInput.value.trim().length < 2;
    };

    recognition.onend = () => {
        isRecording = false;
        btnVoice.classList.remove('recording');
        voiceStatus.classList.remove('active');
    };

    recognition.onerror = (event) => {
        isRecording = false;
        btnVoice.classList.remove('recording');
        voiceStatus.classList.remove('active');
        if (event.error === 'not-allowed') {
            voiceStatus.textContent = '⚠️ 请允许麦克风权限';
            voiceStatus.classList.add('active');
            setTimeout(() => voiceStatus.classList.remove('active'), 3000);
        }
    };

    btnVoice.addEventListener('click', () => {
        if (isRecording) {
            recognition.stop();
        } else {
            voiceStatus.textContent = '正在聆听...';
            recognition.start();
        }
    });
} else {
    btnVoice.style.opacity = '0.4';
    btnVoice.style.cursor = 'not-allowed';
    btnVoice.title = '当前浏览器不支持语音输入';
}

// ========== 图片上传 ==========
const btnImage = document.getElementById('btnImage');
const imageFileInput = document.getElementById('imageFileInput');
const imagePreviewArea = document.getElementById('imagePreviewArea');
const imagePreviewImg = document.getElementById('imagePreviewImg');
const imageRemoveBtn = document.getElementById('imageRemoveBtn');
let uploadedImageBase64 = null;

btnImage.addEventListener('click', () => {
    imageFileInput.click();
});

imageFileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // 检查文件大小（5MB 限制）
    if (file.size > 5 * 1024 * 1024) {
        alert('图片不能超过 5MB');
        return;
    }

    const reader = new FileReader();
    reader.onload = (ev) => {
        uploadedImageBase64 = ev.target.result;
        imagePreviewImg.src = uploadedImageBase64;
        imagePreviewArea.classList.add('active');
        // 有图片时也允许搜索
        btnSearch.disabled = false;
    };
    reader.readAsDataURL(file);
});

imageRemoveBtn.addEventListener('click', () => {
    uploadedImageBase64 = null;
    imagePreviewImg.src = '';
    imagePreviewArea.classList.remove('active');
    imageFileInput.value = '';
    // 重新检查文字输入
    btnSearch.disabled = userInput.value.trim().length < 2;
});

// ========== 返回 ==========
document.getElementById('btnBack').addEventListener('click', () => {
    pageResults.classList.remove('active');
    pageHome.style.display = 'flex';
});
